name: create pr

on:
  workflow_dispatch:

jobs:
  build-dev:

    name: lihitest
    runs-on:
      - ubuntu-latest

    steps:
      - name: Login to docker.io registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.ARGON_DOCKERHUB_USER }}
          password: ${{ secrets.ARGON_DOCKERHUB_TOKEN }}